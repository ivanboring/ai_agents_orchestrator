ai_agents_orchestrator.form:
  path: '/admin/config/ai/agents/orchestrate'
  defaults:
    _form: '\Drupal\ai_agents_orchestrator\Form\AIAgentsOrchestratorForm'
    _title: 'AI Agents Orchestrator'
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.chat:
  path: '/admin/config/ai/agents/orchestrate/chat'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::chat'
  methods: [POST]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.plan_status:
  path: '/admin/config/ai/agents/orchestrate/plan-status'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::planStatus'
  methods: [GET]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.poll:
  path: '/admin/config/ai/agents/orchestrate/poll/{thread_id}'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::poll'
  methods: [GET]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.save_plan:
  path: '/admin/config/ai/agents/orchestrate/save-plan'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::savePlan'
  methods: [POST]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.plan_metadata:
  path: '/admin/config/ai/agents/orchestrate/plan-metadata'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::planMetadata'
  methods: [GET]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.load_chat_history:
  path: '/admin/config/ai/agents/orchestrate/chat-history'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::loadChatHistory'
  methods: [GET]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.save_chat_history:
  path: '/admin/config/ai/agents/orchestrate/chat-history'
  defaults:
    _controller: '\Drupal\ai_agents_orchestrator\Controller\AIAgentsOrchestratorController::saveChatHistory'
  methods: [POST]
  requirements:
    _permission: 'orchestrate ai agents'

ai_agents_orchestrator.list_threads:
